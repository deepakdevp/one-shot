name: Bug Report
description: Something went wrong during a blueprint phase
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Which phase failed?
      options:
        - "Phase 0: Question Collection"
        - "Phase 1-3: Research"
        - "Viability Gate"
        - "Phase 3.5: Compliance"
        - "Phase 4-5: Product Definition"
        - "Phase 6: Architecture"
        - "Phase 7: Brand & Design"
        - "Phase 8: Screen Generation"
        - "Phase 9: Scaffolding"
        - "Phase 10: Build"
        - "Phase 11: Testing"
        - "Phase 11.5: Quality Audit"
        - "Phase 12: Deploy"
        - "Phase 13: Marketing"
        - "Phase 14: Scale"
        - "Setup Script"
    validations:
      required: true
  - type: dropdown
    id: product-type
    attributes:
      label: What product type were you building?
      options:
        - SaaS
        - Tool/Utility
        - API Product
        - Browser Extension
        - Marketplace
        - Mobile App
        - CLI Tool
        - Open Source
        - Template/Boilerplate
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the error or unexpected behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
